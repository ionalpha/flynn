version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - bodyclose
    - depguard
    - errcheck
    - forbidigo
    - gosec
    - govet
    - ineffassign
    - misspell
    - nilerr
    - revive
    - staticcheck
    - unconvert
    - unused
  settings:
    # Enforce the observability ports: nothing logs through log/slog directly.
    # slog lives only inside package observe (its adapter and tests). Every other
    # package depends on the observe.Logger port, so the backend stays swappable.
    depguard:
      rules:
        no-direct-slog:
          files:
            - "**/*.go"
            - "!**/observe/**"
          deny:
            - pkg: "log/slog"
              desc: "log through the observe.Logger port; log/slog is allowed only inside package observe"
        # Randomness is reached through the seeded ids.Generator so a replay
        # re-seeds identically. Only package ids may import a rand source.
        no-direct-rand:
          files:
            - "**/*.go"
            - "!**/ids/**"
            - "!**/*_test.go"
          deny:
            - pkg: "math/rand"
              desc: "use the seeded ids.Generator; direct rand breaks deterministic replay"
            - pkg: "math/rand/v2"
              desc: "use the seeded ids.Generator; direct rand breaks deterministic replay"
            - pkg: "crypto/rand"
              desc: "entropy belongs in package ids; direct crypto/rand breaks deterministic replay"
    # No ad-hoc stdout logging, and no wall-clock or randomness outside their
    # seams: time.Now and rand defeat deterministic replay (see clock and ids).
    forbidigo:
      forbid:
        - pattern: '^fmt\.Print.*$'
          msg: "use the observe.Logger port, not fmt.Print*"
        - pattern: '^time\.Now$'
          msg: "use the injected clock.Clock, not time.Now (deterministic replay)"
  exclusions:
    rules:
      # clock is the home of the system time source, and the migration runner
      # stamps applied_at with wall time (migration bookkeeping is not part of a
      # replayed run), so time.Now is legitimate in both.
      - linters:
          - forbidigo
        path: '(^|/)(clock|migrate)/'
        source: 'time\.Now'
      # gosec's file-permission and file-inclusion rules target production code;
      # test fixtures (temp dirs, reading the module's own sources) are not a
      # threat surface.
      - linters:
          - gosec
        path: _test\.go

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/ionalpha/flynn
