version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - bodyclose
    - copyloopvar
    - depguard
    - errcheck
    - errname
    - errorlint
    - exhaustive
    - forbidigo
    - gocyclo
    - godot
    - gosec
    - govet
    - ineffassign
    - intrange
    - makezero
    - misspell
    - nilerr
    - perfsprint
    - predeclared
    - revive
    - staticcheck
    - unconvert
    - unused
    - wastedassign
    - whitespace
  # Readability linters: whitespace and godot are enabled; nlreturn and wsl are
  # deliberately not. The code is already gofumpt-formatted and spaced by hand, so
  # whitespace (strip leading/trailing blank lines in blocks) and godot (period-end
  # declaration comments) cost ~one line of change across the tree and lock the
  # existing standard. nlreturn (blank line before every return) and wsl (statement
  # cuddling rules) were trialled with --fix and rejected: they add ~595 and ~2,700
  # lines respectively, fighting the hand-tuned spacing and the tight helper funcs
  # rather than improving them.
  settings:
    exhaustive:
      # A switch with a default case is exhaustive: the default deliberately covers
      # the remaining enum values, so code is not forced to enumerate every constant.
      # Switches without a default are still checked, catching real missing cases.
      default-signifies-exhaustive: true
    gocyclo:
      # The two functions at the current ceiling (a JSON-schema validator and a test
      # helper) are branchy but clear; this guards against new sprawl past them.
      min-complexity: 45
    # Enforce the observability ports: nothing logs through log/slog directly.
    # slog lives only inside package observe (its adapter and tests). Every other
    # package depends on the observe.Logger port, so the backend stays swappable.
    depguard:
      rules:
        no-direct-slog:
          files:
            - "**/*.go"
            - "!**/observe/**"
          deny:
            - pkg: "log/slog"
              desc: "log through the observe.Logger port; log/slog is allowed only inside package observe"
        # Process execution goes through the sandbox boundary so it is confined,
        # governed, and auditable; nothing spawns a process around it. Only the
        # sandbox (the boundary itself) and the hardware probe (which must read the
        # real host, so it cannot be sandboxed, and runs a fixed command with no
        # untrusted input) may spawn a process directly.
        no-direct-exec:
          files:
            - "**/*.go"
            - "!**/sandbox/**"
            - "!**/hardware/**"
            - "!**/*_test.go"
          deny:
            - pkg: "os/exec"
              desc: "spawn processes only through the sandbox boundary; direct os/exec bypasses isolation, governance, and audit"
        # Randomness is reached through the seeded ids.Generator so a replay
        # re-seeds identically. Only package ids may import a rand source.
        no-direct-rand:
          files:
            - "**/*.go"
            - "!**/ids/**"
            - "!**/*_test.go"
          deny:
            - pkg: "math/rand"
              desc: "use the seeded ids.Generator; direct rand breaks deterministic replay"
            - pkg: "math/rand/v2"
              desc: "use the seeded ids.Generator; direct rand breaks deterministic replay"
            - pkg: "crypto/rand"
              desc: "entropy belongs in package ids; direct crypto/rand breaks deterministic replay"
        # Layer direction (see ARCHITECTURE.md). The dependency graph is acyclic
        # and packages only import lower layers. This rule protects the core
        # (foundation, primitives, core-data) from importing the engine above it:
        # a primitive that reaches up into a domain package is the inversion that
        # turns a clean graph into a ball of mud. Test files are exempt so an
        # integration test in a low package may still exercise the engine.
        layer-direction:
          files:
            - "**/clock/**"
            - "**/fault/**"
            - "**/llm/**"
            - "**/observe/**"
            - "**/spine/**"
            - "**/hlc/**"
            - "**/ids/**"
            - "**/sandbox/**"
            - "**/bus/**"
            - "**/state/**"
            - "**/resource/**"
            - "**/provider/**"
            - "!**/*_test.go"
          deny:
            - pkg: "github.com/ionalpha/flynn/dispatch"
              desc: "core may not import the engine (layer inversion); see ARCHITECTURE.md"
            - pkg: "github.com/ionalpha/flynn/capability"
              desc: "core may not import the engine (layer inversion); see ARCHITECTURE.md"
            - pkg: "github.com/ionalpha/flynn/reconcile"
              desc: "core may not import the engine (layer inversion); see ARCHITECTURE.md"
            - pkg: "github.com/ionalpha/flynn/jobs"
              desc: "core may not import the engine (layer inversion); see ARCHITECTURE.md"
            - pkg: "github.com/ionalpha/flynn/memory"
              desc: "core may not import the engine (layer inversion); see ARCHITECTURE.md"
            - pkg: "github.com/ionalpha/flynn/skill"
              desc: "core may not import the engine (layer inversion); see ARCHITECTURE.md"
            - pkg: "github.com/ionalpha/flynn/spinesink"
              desc: "core may not import the engine (layer inversion); see ARCHITECTURE.md"
            - pkg: "github.com/ionalpha/flynn/goal"
              desc: "core may not import the engine (layer inversion); see ARCHITECTURE.md"
            - pkg: "github.com/ionalpha/flynn/learn"
              desc: "core may not import the engine (layer inversion); see ARCHITECTURE.md"
            - pkg: "github.com/ionalpha/flynn/mission"
              desc: "core may not import the engine (layer inversion); see ARCHITECTURE.md"
            - pkg: "github.com/ionalpha/flynn/runtime"
              desc: "core may not import the engine (layer inversion); see ARCHITECTURE.md"
            - pkg: "github.com/ionalpha/flynn/tools"
              desc: "core may not import the engine (layer inversion); see ARCHITECTURE.md"
            - pkg: "github.com/ionalpha/flynn/session"
              desc: "core may not import the engine (layer inversion); see ARCHITECTURE.md"
            - pkg: "github.com/ionalpha/flynn/storage/sqlite"
              desc: "core may not import the engine (layer inversion); see ARCHITECTURE.md"
    # No ad-hoc stdout logging, and no wall-clock or randomness outside their
    # seams: time.Now and rand defeat deterministic replay (see clock and ids).
    forbidigo:
      forbid:
        - pattern: '^fmt\.Print.*$'
          msg: "use the observe.Logger port, not fmt.Print*"
        - pattern: '^time\.Now$'
          msg: "use the injected clock.Clock, not time.Now (deterministic replay)"
        # Outbound connections go through netguard, the default-deny egress gate that
        # blocks SSRF to private, loopback, and cloud-metadata addresses after DNS
        # resolution. Nothing dials around it: the raw dial primitives and the
        # unguarded standard clients are forbidden outside netguard (relaxed there and
        # in _test.go via the exclusions below). A new bypass fails CI.
        - pattern: '^net\.Dial[a-zA-Z]*$'
          msg: "open outbound connections through netguard.Client, not a raw net.Dial, which bypasses the egress policy"
        - pattern: '^net\.Dialer$'
          msg: "build dialers inside netguard; a raw net.Dialer elsewhere bypasses the egress policy"
        - pattern: '^tls\.Dial[a-zA-Z]*$'
          msg: "open outbound TLS connections through netguard.Client, not a raw tls.Dial"
        - pattern: '^http\.Get$'
          msg: "use a netguard-backed client; http.Get dials via the unguarded default client"
        - pattern: '^http\.Post$'
          msg: "use a netguard-backed client; http.Post dials via the unguarded default client"
        - pattern: '^http\.Head$'
          msg: "use a netguard-backed client; http.Head dials via the unguarded default client"
        - pattern: '^http\.PostForm$'
          msg: "use a netguard-backed client; http.PostForm dials via the unguarded default client"
        - pattern: '^http\.DefaultClient$'
          msg: "the default HTTP client ignores egress policy; dial through netguard.Client"
        - pattern: '^http\.DefaultTransport$'
          msg: "the default transport ignores egress policy; dial through netguard.Client"
        # Inbound listeners go through bindguard, the bind-safe inbound gate that
        # refuses a wildcard bind and a non-loopback bind without an explicit opt-in.
        # Nothing binds around it: the raw listen primitives and the standard library's
        # one-call serve helpers are forbidden outside bindguard (relaxed there and in
        # _test.go via the exclusions below). A new ungoverned listener fails CI.
        - pattern: '^net\.Listen$'
          msg: "open listeners through bindguard.Listen, not a raw net.Listen, which bypasses the bind-safe inbound policy"
        - pattern: '^net\.ListenTCP$'
          msg: "open listeners through bindguard.Listen, not net.ListenTCP, which bypasses the bind-safe inbound policy"
        - pattern: '^net\.ListenPacket$'
          msg: "open listeners through bindguard, not net.ListenPacket, which bypasses the bind-safe inbound policy"
        - pattern: '^tls\.Listen$'
          msg: "open TLS listeners through bindguard, not a raw tls.Listen"
        - pattern: '\.ListenAndServe(TLS)?$'
          msg: "bind through bindguard.Listen and call (*http.Server).Serve(ln); ListenAndServe binds the address ungoverned"
        - pattern: '^http\.ListenAndServe(TLS)?$'
          msg: "bind through bindguard.Listen and call (*http.Server).Serve(ln); http.ListenAndServe binds the address ungoverned"
  exclusions:
    rules:
      # clock is the home of the system time source, and the migration runner
      # stamps applied_at with wall time (migration bookkeeping is not part of a
      # replayed run), so time.Now is legitimate in both.
      - linters:
          - forbidigo
        path: '(^|/)(clock|migrate)/'
        source: 'time\.Now'
      # netguard is the egress boundary itself: the one package that may hold the raw
      # dial primitives and build the hardened client every other package dials
      # through, so the egress forbids do not apply to it.
      - linters:
          - forbidigo
        path: '(^|/)netguard/'
        source: '(net\.Dial|net\.Dialer|tls\.Dial|http\.(DefaultClient|DefaultTransport|Get|Post|Head|PostForm))'
      # bindguard is the inbound boundary itself: the one package that may hold the raw
      # listen primitive every other package binds through, so the inbound forbids do
      # not apply to it.
      - linters:
          - forbidigo
        path: '(^|/)bindguard/'
        source: '(net\.Listen|net\.ListenTCP|net\.ListenPacket|tls\.Listen|ListenAndServe)'
      # The egress boundary protects shipped code, not the test harness: tests may use
      # httptest and the standard client directly. The no-fmt.Print and no-time.Now
      # forbids still apply in tests; only the egress ones are relaxed here.
      - linters:
          - forbidigo
        path: _test\.go
        source: '(net\.Dial|net\.Dialer|tls\.Dial|http\.(DefaultClient|DefaultTransport|Get|Post|Head|PostForm))'
      # The inbound boundary protects shipped code, not the test harness: tests may open
      # a listener (httptest, a local probe) directly. Only the inbound listen forbids
      # are relaxed here; the no-fmt.Print and no-time.Now forbids still apply.
      - linters:
          - forbidigo
        path: _test\.go
        source: '(net\.Listen|net\.ListenTCP|net\.ListenPacket|tls\.Listen|ListenAndServe)'
      # gosec's file-permission and file-inclusion rules target production code;
      # test fixtures (temp dirs, reading the module's own sources) are not a
      # threat surface.
      - linters:
          - gosec
        path: _test\.go
      # A test switch deliberately handles only the cases that test exercises;
      # enum exhaustiveness is a production-code concern.
      - linters:
          - exhaustive
        path: _test\.go

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/ionalpha/flynn
