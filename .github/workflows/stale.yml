name: Stale

on:
  schedule:
    - cron: "30 1 * * *"

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          days-before-stale: 45
          days-before-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: "pinned,security,roadmap,good first issue"
          exempt-pr-labels: "pinned,security,work-in-progress"
          stale-issue-message: >
            This issue has had no activity for 45 days and will be closed in 14 days
            if nothing further happens. Comment to keep it open.
          stale-pr-message: >
            This pull request has had no activity for 45 days and will be closed in 14
            days if nothing further happens. Push or comment to keep it open.
