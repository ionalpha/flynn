name: CLA

# Require every external contributor to sign the Contributor License Agreement
# (CLA.md) before a pull request can be merged. Signatures are recorded by the
# assistant in a dedicated branch. The maintainer identity and bots are allow-listed
# so internal and automated changes are not blocked.
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    name: Check CLA signature
    runs-on: ubuntu-latest
    steps:
      - name: CLA assistant
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          # Signatures are stored in this same repository, so the built-in token is
          # sufficient. No personal access token or repository secret is required.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: 'signatures/cla.json'
          path-to-document: 'https://github.com/ionalpha/flynn/blob/main/CLA.md'
          branch: 'cla-signatures'
          allowlist: 'ion-alpha-dev,dependabot[bot]'
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA.'
