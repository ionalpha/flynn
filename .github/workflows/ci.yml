name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Use bash on every OS (including Windows) so command parsing is identical.
# Windows runners default `run:` to PowerShell, which mangles native args like
# `-coverprofile=coverage.out` (go then sees a stray `.out` package).
defaults:
  run:
    shell: bash

jobs:
  test:
    name: Test (${{ matrix.os }} / Go ${{ matrix.go }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        # Floor is Go 1.25: modernc.org/sqlite requires it (and it brings GA testing/synctest).
        go: ["1.25"]
    steps:
      # TODO: pin actions to a full commit SHA (see task 4a54468e). Dependabot keeps them current.
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: true
      # Run the same dev/ scripts contributors run locally, so local == CI.
      - run: ./dev/build
      - run: go vet ./...
      - run: ./dev/test
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.go == '1.25'
        uses: codecov/codecov-action@v7
        with:
          files: coverage.out
        continue-on-error: true

  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true
      # Install the pinned linter, then run the same dev/lint script contributors
      # run locally (which also checks `go mod tidy` is clean). Keep this version
      # in sync with the GOLANGCI_VERSION pin in dev/lint.
      - name: Install golangci-lint (pinned)
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
      - run: ./dev/lint

  vuln:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true
      - run: ./dev/vuln

  fuzz:
    name: Fuzz smoke
    runs-on: ubuntu-latest
    # Fuzz targets are added by the engineering-rigor work (task 6f520130).
    # Tolerant until then so it never blocks an empty package.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true
      - run: go test -run=^$ -fuzz=. -fuzztime=20s ./... || true

  # Enforce the PR template at the gate, not just in dev/pr: this catches PRs
  # opened any other way (gh directly, the web UI, an API call). The body comes
  # from the event payload via env — never interpolated into the script — so a
  # crafted body can't inject shell. Skipped on push (no PR body to check).
  pr-body:
    name: PR body follows template
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Require template sections
        env:
          BODY: ${{ github.event.pull_request.body }}
        run: |
          missing=0
          for section in "## What" "## Why" "## How to verify"; do
            case "$BODY" in
              *"$section"*) ;;
              *) echo "::error::PR body is missing the '$section' section."; missing=1 ;;
            esac
          done
          if [ "$missing" -ne 0 ]; then
            echo "Base the description on .github/PULL_REQUEST_TEMPLATE.md (What / Why / How to verify / Notes)."
            exit 1
          fi
          echo "PR body contains all required template sections."

  # A single, stable gate to require in branch protection. Because it depends on
  # the real jobs rather than naming them, the test matrix (OS / Go version) can
  # change freely without ever breaking the required-checks list.
  ci-success:
    name: CI success
    if: always()
    needs: [test, lint, vuln, pr-body]
    runs-on: ubuntu-latest
    steps:
      - name: Verify required jobs succeeded
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "A required job failed or was cancelled."
          exit 1
      - run: echo "All required CI jobs passed."
