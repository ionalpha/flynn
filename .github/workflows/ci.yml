name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Use bash on every OS (including Windows) so command parsing is identical.
# Windows runners default `run:` to PowerShell, which mangles native args like
# `-coverprofile=coverage.out` (go then sees a stray `.out` package).
defaults:
  run:
    shell: bash

jobs:
  test:
    name: Test (${{ matrix.os }} / Go ${{ matrix.go }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ["1.24", "1.25"]
    steps:
      # TODO: pin actions to a full commit SHA (see task 4a54468e). Dependabot keeps them current.
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race -covermode=atomic -coverprofile=coverage.out ./...
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.go == '1.25'
        uses: codecov/codecov-action@v5
        with:
          files: coverage.out
        continue-on-error: true

  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: go mod tidy is clean
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum
      - name: golangci-lint
        # v8 of the action installs golangci-lint v2 (v6 caps at v1 and cannot
        # read a v2 config). Pin the linter version for deterministic results.
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2

  vuln:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  fuzz:
    name: Fuzz smoke
    runs-on: ubuntu-latest
    # Fuzz targets are added by the engineering-rigor work (task 6f520130).
    # Tolerant until then so it never blocks an empty package.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - run: go test -run=^$ -fuzz=. -fuzztime=20s ./... || true
